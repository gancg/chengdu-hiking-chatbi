<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title>成都徒步 ChatBI 推荐流程</title>
  <desc>用户描述需求，Qwen Agent 将其转换为结构化条件并调用推荐工具。ChatBIService 从 SQLite 读取已审核数据，完成过滤、计算和评分后，经 Agent 返回推荐结果。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fbfcff"/><stop offset="1" stop-color="#eef4f8"/></linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#718398"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#23364b" flood-opacity=".12"/></filter>
    <style>.t{font-family:"Microsoft YaHei","PingFang SC",sans-serif;fill:#20384d;text-anchor:middle}.head{font-size:28px;font-weight:700}.name{font-size:19px;font-weight:700}.txt{font-size:16px}.note{font-size:14px;fill:#6d8091}.life{stroke:#aebdca;stroke-width:2;stroke-dasharray:7 7}.msg{stroke:#718398;stroke-width:2.4;fill:none;marker-end:url(#arr)}.return{stroke:#5f9c7e;stroke-dasharray:8 5}.card{rx:14;filter:url(#sh);stroke-width:2}</style>
  </defs>
  <rect width="1400" height="700" rx="22" fill="url(#bg2)"/>
  <text x="700" y="48" class="t head">一次路线推荐如何完成</text><text x="700" y="76" class="t note">模型负责理解和表达，服务层负责事实与计算</text>

  <g class="card">
    <rect x="60" y="105" width="185" height="78" fill="#e9f6ef" stroke="#52a67f"/><rect x="335" y="105" width="185" height="78" fill="#f0ebff" stroke="#8066c2"/><rect x="610" y="105" width="185" height="78" fill="#fff3d8" stroke="#d59b2b"/><rect x="885" y="105" width="185" height="78" fill="#e3f1ff" stroke="#4d8ec6"/><rect x="1160" y="105" width="185" height="78" fill="#eef2f6" stroke="#7890a4"/>
  </g>
  <text x="152" y="139" class="t name">用户</text><text x="152" y="164" class="t note">自然语言</text><text x="427" y="139" class="t name">Qwen Agent</text><text x="427" y="164" class="t note">理解与表达</text><text x="702" y="139" class="t name">推荐工具</text><text x="702" y="164" class="t note">参数边界</text><text x="977" y="139" class="t name">ChatBIService</text><text x="977" y="164" class="t note">业务编排</text><text x="1252" y="139" class="t name">SQLite</text><text x="1252" y="164" class="t note">审核事实</text>
  <line x1="152" y1="183" x2="152" y2="640" class="life"/><line x1="427" y1="183" x2="427" y2="640" class="life"/><line x1="702" y1="183" x2="702" y2="640" class="life"/><line x1="977" y1="183" x2="977" y2="640" class="life"/><line x1="1252" y1="183" x2="1252" y2="640" class="life"/>

  <path d="M152 235 H427" class="msg"/><text x="289" y="225" class="t txt">描述日期、体力与风景偏好</text>
  <path d="M427 305 H702" class="msg"/><text x="564" y="295" class="t txt">转换为结构化推荐条件</text>
  <path d="M702 375 H977" class="msg"/><text x="839" y="365" class="t txt">recommendations(query)</text>
  <path d="M977 445 H1252" class="msg"/><text x="1114" y="435" class="t txt">读取已审核路线、费用和交通画像</text>
  <path d="M977 500 C1080 500 1080 555 977 555" class="msg"/><text x="1135" y="522" class="t txt">硬约束过滤</text><text x="1135" y="545" class="t txt">费用 · 交通 · 评分</text>
  <path d="M977 590 H427" class="msg return"/><text x="702" y="580" class="t txt">候选路线、推荐依据与风险信息</text>
  <path d="M427 635 H152" class="msg return"/><text x="289" y="625" class="t txt">生成清晰、可追溯的推荐</text>
</svg>
